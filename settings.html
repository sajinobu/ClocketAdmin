<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Clocket</title>
  
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/settings.css">
  
  <script type="module" src="scripts/firebase-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: 'var(--brand-darkest)', 
              darker: 'var(--brand-darker)', 
              dark: 'var(--brand-dark)',
              primary: 'var(--brand-primary)', 
              secondary: 'var(--brand-secondary)', 
              accent: 'var(--brand-accent)',
              accentLight: 'var(--brand-accent-light)', 
              grayLight: 'var(--brand-gray-light)', 
              grayBg: 'var(--brand-gray-bg)',
              surface: 'var(--brand-surface)'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-brand-grayBg font-sans text-brand-darkest overflow-auto transition-colors duration-300">
  <div class="flex flex-col h-full w-full">
    
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
      
      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-auto bg-brand-grayBg relative transition-colors duration-300">
        
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <div class="page-header-container">
            <h1 class="page-title text-2xl font-bold text-brand-darkest transition-colors">Settings</h1>
            <p class="page-subtitle text-sm text-brand-dark transition-colors">Configure portal preferences and security</p>
          </div>
        </div>
        
        <div class="px-4 sm:px-6 md:px-8 pt-6 pb-8">
          <div class="space-y-6 max-w-2xl">
            
            <div class="settings-panel">
              <h3 class="panel-title">Display Preferences</h3>
              
              <div class="setting-row">
                <div>
                  <p class="setting-label">Compact Mode</p>
                  <p class="setting-desc">Reduce spacing in tables and cards to fit more information on the screen.</p>
                </div>
                <label class="toggle-wrapper">
                  <input type="checkbox" class="toggle-input" id="toggle-compact-mode">
                  <div class="toggle-bg"></div>
                </label>
              </div>
            </div>

            <div class="settings-panel">
              <h3 class="panel-title">Data & Privacy</h3>
              <p class="panel-desc">Manage how your portal data is used, stored, and exported for compliance.</p>
              <button id="download-data-btn" class="btn-outline">
                <i data-lucide="download" class="w-4 h-4"></i> Download My Data
              </button>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="scripts/layout.js"></script>
  <script src="scripts/settings.js"></script>
</body>
</html>
