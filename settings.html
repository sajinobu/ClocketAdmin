<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - TimeTrack Portal</title>
  <link rel="stylesheet" href="styles/styles.css">
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { darkest: '#000523', primary: '#001aff', secondary: '#007bff', accent: '#00d1ff' }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-gray-50 font-sans text-gray-700 overflow-auto">
  <div class="flex flex-col h-full w-full">
    
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
      
      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-auto bg-gray-50">
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <h1 class="text-2xl font-bold text-brand-darkest">Settings</h1>
          <p class="text-sm text-gray-500">Configure portal settings</p>
        </div>
        
        <div class="px-4 sm:px-6 md:px-8 pt-6 pb-8">
          <div class="space-y-6 max-w-2xl">
            <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
              <h3 class="text-lg font-bold text-gray-800 mb-6">General Settings</h3>
              <div class="space-y-6">
                <div class="flex items-center justify-between">
                  <div>
                    <p class="font-medium text-gray-800">Email Notifications</p>
                    <p class="text-sm text-gray-500 mt-1">Receive alerts for important events</p>
                  </div>
                  <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-teal-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-teal-600"></div>
                  </label>
                </div>
                <div class="flex items-center justify-between">
                  <div>
                    <p class="font-medium text-gray-800">Two-Factor Authentication</p>
                    <p class="text-sm text-gray-500 mt-1">Enhance account security</p>
                  </div>
                  <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-teal-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-teal-600"></div>
                  </label>
                </div>
              </div>
            </div>
            <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
              <h3 class="text-lg font-bold text-gray-800 mb-4">Data & Privacy</h3>
              <p class="text-sm text-gray-600 mb-4">Manage how your data is used and stored</p>
              <button class="px-4 py-2 border border-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Download My Data</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="scripts/layout.js"></script>
  <script src="scripts/settings.js"></script>
</body>
</html>
