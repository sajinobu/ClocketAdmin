<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Details | Clocket</title>
  
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/team-details.css">
  
  <script type="module" src="scripts/firebase-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: 'var(--brand-darkest)', 
              darker: 'var(--brand-darker)', 
              dark: 'var(--brand-dark)',
              primary: 'var(--brand-primary)', 
              secondary: 'var(--brand-secondary)', 
              accent: 'var(--brand-accent)',
              accentLight: 'var(--brand-accent-light)', 
              grayLight: 'var(--brand-gray-light)', 
              grayBg: 'var(--brand-gray-bg)',
              surface: 'var(--brand-surface)'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-brand-grayBg font-sans text-brand-darkest overflow-auto transition-colors duration-300">
  <div class="flex flex-col h-full w-full">
    
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
      
      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-auto bg-brand-grayBg relative transition-colors duration-300">
        
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <div class="flex items-center justify-between gap-4 mb-4">
            <div class="flex items-center gap-4">
                <a id="dynamic-back-btn" href="management.html?tab=teams" class="p-2 text-brand-dark hover:text-brand-primary hover:bg-brand-grayBg rounded-lg transition-colors flex items-center justify-center">
                 <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <h1 class="text-2xl font-bold text-brand-darkest transition-colors">Team Overview</h1>
            </div>
            <div>
              <a href="team-edit.html?from=team-details" id="edit-team-btn" class="btn-primary">
                <i data-lucide="pencil" class="w-4 h-4"></i> Edit Team
              </a>
            </div>
          </div>
        </div>
        
        <div class="px-4 sm:px-6 md:px-8 pt-6 pb-8">
          <div class="space-y-6">
            
            <div class="hero-panel">
              <div>
                <div class="hero-meta">
                  <span class="hero-badge" id="detail-dept-badge">Loading...</span>
                  <span class="text-brand-dark">•</span>
                  <span class="hero-date" id="detail-est-date">EST. --</span>
                </div>
                <h2 class="hero-title" id="detail-team-name">Loading...</h2>
                <p class="hero-desc" id="detail-team-desc">...</p>
              </div>

              <div class="leader-box">
                <p class="leader-label">Team Leader</p>
                <div class="leader-info">
                  <img src="" id="detail-lead-avatar" class="w-12 h-12 rounded-full object-cover border-2 border-brand-grayLight bg-white" alt="Leader" style="display: none;">
                  <div>
                    <p class="leader-name" id="detail-lead-name">Loading...</p>
                    <a href="#" class="link-action" id="detail-lead-link" style="display: none;">View Profile</a>
                  </div>
                </div>
              </div>
            </div>

            <div class="stat-grid">
              <div class="stat-card">
                <p class="stat-label">Active Members</p>
                <div class="stat-row">
                  <p class="stat-value" id="detail-stat-members">0</p>
                  <span class="stat-trend"><i data-lucide="arrow-up" class="w-3 h-3 mr-1"></i> 100% Online</span>
                </div>
              </div>
              <div class="stat-card">
                <p class="stat-label">Weekly Hours</p>
                <p class="stat-value">-- h</p>
              </div>
              <div class="stat-card">
                <p class="stat-label">Avg Clock-in</p>
                <p class="stat-value">--:-- AM</p>
              </div>
              <div class="stat-card">
                <p class="stat-label">On-Time Rate</p>
                <p class="stat-value text-brand">-- %</p>
              </div>
            </div>

            <div class="table-panel">
              <div class="table-header">
                <h3 class="table-title">Team Members</h3>
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="member-search" placeholder="Search members..." class="search-input">
                </div>
              </div>

              <div class="table-wrapper">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th class="table-th">Employee</th>
                      <th class="table-th">Department</th>
                      <th class="table-th">Status</th>
                      <th class="table-th">Today's Time</th>
                      <th class="table-th text-right">Action</th>
                    </tr>
                  </thead>
                  <tbody id="member-table-body">
                    
                    <tr id="no-members-row" style="display: none;">
                        <td colspan="5" class="empty-state text-brand-dark transition-colors py-8 text-center">
                            <p class="text-sm font-medium">No members match your search.</p>
                        </td>
                    </tr>

                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="scripts/layout.js"></script>
  <script src="scripts/team-details.js"></script>
</body>
</html>
