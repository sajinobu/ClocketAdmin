<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracking | Clocket</title>
  
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/live-tracking.css">
  
  <script type="module" src="scripts/firebase-config.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: 'var(--brand-darkest)', 
              darker: 'var(--brand-darker)', 
              dark: 'var(--brand-dark)',
              primary: 'var(--brand-primary)', 
              secondary: 'var(--brand-secondary)', 
              accent: 'var(--brand-accent)',
              accentLight: 'var(--brand-accent-light)', 
              grayLight: 'var(--brand-gray-light)', 
              grayBg: 'var(--brand-gray-bg)',
              surface: 'var(--brand-surface)'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
</head>

<body class="h-full bg-brand-grayBg font-sans text-brand-darkest overflow-auto transition-colors duration-300">
  <div class="flex flex-col h-full w-full">

    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">

      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-y-auto overflow-x-hidden bg-brand-grayBg flex flex-col relative transition-colors duration-300">
        
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <h1 class="page-title text-2xl font-bold text-brand-darkest transition-colors">Live Tracking</h1>
          <p class="page-subtitle text-sm text-brand-dark transition-colors">Connecting to tracker...</p>
        </div>

        <div class="px-8 py-4 flex gap-4 overflow-x-auto no-scrollbar flex-shrink-0">
          <div class="stat-pill">
            <div class="w-2 h-2 rounded-full" style="background-color: var(--brand-accent); box-shadow: 0 0 8px var(--brand-accent);"></div>
            <span>You</span>
          </div>
          <div class="stat-pill">
            <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
            <span>Active</span>
          </div>
          <div class="stat-pill">
            <div class="w-2 h-2 bg-slate-500 rounded-full"></div>
            <span>Inactive</span>
          </div>
        </div>

        <div class="tracking-container">

          <div class="map-panel">
            <div id="map" class="w-full h-full z-0"></div>
            
            <div class="map-controls">
              <button id="map-zoom-in" class="btn-map">
                <i data-lucide="plus" class="w-5 h-5"></i>
              </button>
              <button id="map-zoom-out" class="btn-map">
                <i data-lucide="minus" class="w-5 h-5"></i>
              </button>
              <button id="map-recenter" class="btn-map btn-map-primary" title="Find My Location">
                <i data-lucide="navigation" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <div class="sidebar-panel">
            
            <div class="sidebar-header">
              <h3 class="font-bold text-brand-darkest transition-colors">All Employees</h3>
              <div class="search-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="staff-search" placeholder="Search name or team..." class="search-input">
              </div>
            </div>

            <div class="staff-list flex-1 overflow-y-auto" id="staff-list">
              <div class="p-6 text-center text-gray-500 text-sm flex flex-col items-center justify-center gap-3">
                <i data-lucide="loader" class="w-6 h-6 animate-spin text-brand-primary"></i>
                <p>Loading database...</p>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="scripts/layout.js"></script>
  <script src="scripts/live-tracking.js"></script>
</body>
</html>
