<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Employee - TimeTrack Portal</title>
  <link rel="stylesheet" href="styles.css">
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { darkest: '#000523', primary: '#001aff', secondary: '#007bff', accent: '#00d1ff' }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-gray-50 font-sans text-gray-700 overflow-auto">
  <div class="flex flex-col h-full w-full">
    
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <header class="bg-white border-b border-gray-200 px-4 md:px-8 py-5 flex-shrink-0">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button id="mobile-menu-btn" class="mobile-menu-btn p-2 hover:bg-gray-100 rounded-lg transition-colors mr-2 lg:hidden">
            <i data-lucide="menu" class="w-6 h-6"></i>
          </button>
          <div class="w-10 h-10 bg-brand-secondary rounded-xl flex items-center justify-center text-white">
            <i data-lucide="clock" class="w-6 h-6"></i>
          </div>
          <span class="text-lg font-bold text-brand-darkest">TimeTrack</span>
        </div>
        <button id="theme-toggle" class="px-4 py-2 bg-gray-100 rounded-full text-sm font-medium text-gray-700"></button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      
      <aside class="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 overflow-y-auto">
        <nav class="py-4">
          <div class="px-4 mb-2"><span class="text-xs font-semibold uppercase tracking-wider text-gray-400">Main</span></div>
          
          <a href="dashboard.html" class="sidebar-item w-full text-left flex items-center gap-3 px-6 py-3 font-medium">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
          </a> 
          <a href="management.html" class="sidebar-item active w-full text-left flex items-center gap-3 px-6 py-3">
            <i data-lucide="users" class="w-5 h-5"></i><span>Management</span>
          </a> 
          <a href="reports.html" class="sidebar-item w-full text-left flex items-center gap-3 px-6 py-3">
            <i data-lucide="file-text" class="w-5 h-5"></i><span>Reports</span>
          </a> 
          <a href="locations.html" class="sidebar-item w-full text-left flex items-center gap-3 px-6 py-3">
            <i data-lucide="map-pin" class="w-5 h-5"></i><span>Locations</span>
          </a> 
          <a href="schedule.html" class="sidebar-item w-full text-left flex items-center gap-3 px-6 py-3">
            <i data-lucide="calendar" class="w-5 h-5"></i><span>Schedule</span>
          </a>
          
          <div class="px-4 mt-6 mb-2"><span class="text-xs font-semibold uppercase tracking-wider text-gray-400">Settings</span></div>
          <a href="settings.html" class="sidebar-item w-full text-left flex items-center gap-3 px-6 py-3">
            <i data-lucide="settings" class="w-5 h-5"></i><span>Settings</span>
          </a>
        </nav>
        
        <div class="p-4 border-t border-gray-100 mt-auto relative">
          <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer group" id="profile-btn">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center text-white font-semibold">AM</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-800 truncate">Admin Manager</p>
              <p class="text-xs text-gray-500">admin@company.com</p>
            </div>
            <i data-lucide="more-vertical" class="w-5 h-5 text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity"></i>
          </div>
          
          <div class="hidden absolute bottom-full left-4 right-4 mb-2 bg-white rounded-lg shadow-lg border border-gray-200 z-50" id="profile-dropdown">
            <a href="profile.html" class="block w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-b border-gray-100">Profile</a> 
            <button class="w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50" id="logout-btn">Sign Out</button>
          </div>
        </div>
      </aside>

      <main class="flex-1 overflow-auto bg-gray-50">
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <div class="flex items-center gap-4 mb-1">
            <a href="management.html" class="text-gray-400 hover:text-gray-600 transition-colors">
             <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="text-2xl font-bold text-brand-darkest">Add New Employee</h1>
          </div>
        </div>
        
        <div class="px-4 sm:px-6 md:px-8 pt-6 pb-8">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
              <form id="add-employee-form" class="space-y-6">
                <div>
                  <h3 class="text-lg font-bold text-gray-800 mb-4">Personal Information</h3>
                  <div class="grid grid-cols-3 gap-3">
                    <div>
                      <label for="first-name" class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                      <input type="text" id="first-name" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-primary" placeholder="John" style="background-color: #ffffff;">
                    </div>
                    <div>
                      <label for="middle-name" class="block text-sm font-medium text-gray-700 mb-2">Middle Name</label>
                      <input type="text" id="middle-name" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-primary" placeholder="Michael" style="background-color: #ffffff;">
                    </div>
                    <div>
                      <label for="last-name" class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                      <input type="text" id="last-name" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-primary" placeholder="Doe" style="background-color: #ffffff;">
                    </div>
                  </div>
                </div>

                <div>
                  <h3 class="text-lg font-bold text-gray-800 mb-4">Contact Information</h3>
                  <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" placeholder="john.doe@company.com" style="background-color: #ffffff;">
                  </div>
                </div>

                <div>
                  <h3 class="text-lg font-bold text-gray-800 mb-4">Employment Information</h3>
                  <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                      <label for="employee-id" class="block text-sm font-medium text-gray-700 mb-2">Employee ID</label>
                      <input type="text" id="employee-id" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" placeholder="e.g., EMP-001" style="background-color: #ffffff;">
                    </div>
                    <div>
                      <label for="department" class="block text-sm font-medium text-gray-700 mb-2">Department</label>
                      <select id="department" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" style="background-color: #ffffff;">
                        <option value="">Select Department</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Design">Design</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label for="assigned-team" class="block text-sm font-medium text-gray-700 mb-2">Assigned Team</label>
                    <select id="assigned-team" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" style="background-color: #ffffff;">
                      <option value="">Select Team</option>
                      <option value="Engineering Team A">Engineering Team A</option>
                      <option value="Design Team B">Design Team B</option>
                      <option value="Operations Team A">Operations Team A</option>
                    </select>
                  </div>
                </div>
              </form>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 flex flex-col">
              <div class="space-y-6 flex-1 flex flex-col">
                <div class="flex-1">
                  <h3 class="text-lg font-bold text-gray-800 mb-4">System Role</h3>
                  <div class="space-y-3">
                    <label class="flex items-center gap-3 cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                      <input type="radio" name="system-role" value="Employee" checked class="w-4 h-4 accent-teal-600" form="add-employee-form">
                      <div>
                        <span class="text-sm font-medium text-gray-800">Employee</span>
                        <p class="text-xs text-gray-500">Standard user with limited permissions</p>
                      </div>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                      <input type="radio" name="system-role" value="Manager" class="w-4 h-4 accent-teal-600" form="add-employee-form">
                      <div>
                        <span class="text-sm font-medium text-gray-800">Manager</span>
                        <p class="text-xs text-gray-500">Team management and reporting access</p>
                      </div>
                    </label>
                  </div>
                </div>

                <div class="flex gap-3 pt-6 border-t border-gray-100 mt-auto">
                  <button type="submit" form="add-employee-form" class="flex-1 px-6 py-3 bg-teal-600 text-white rounded-lg font-medium hover:bg-teal-700 transition-colors">Add Employee</button>
                  <a href="management.html" class="px-6 py-3 border border-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors text-center">Cancel</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="scripts/add-employee.js"></script>
</body>
</html>
