<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clocket | Add Employee</title>
  
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/add-employee.css">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: 'var(--brand-darkest)', 
              darker: 'var(--brand-darker)', 
              dark: 'var(--brand-dark)',
              primary: 'var(--brand-primary)', 
              secondary: 'var(--brand-secondary)', 
              accent: 'var(--brand-accent)',
              accentLight: 'var(--brand-accent-light)', 
              grayLight: 'var(--brand-gray-light)', 
              grayBg: 'var(--brand-gray-bg)',
              surface: 'var(--brand-surface)'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-brand-grayBg font-sans text-brand-darkest overflow-auto transition-colors duration-300">
  <div class="flex flex-col h-full w-full">
    
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
      
      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-auto bg-brand-grayBg relative transition-colors duration-300">
        
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <div class="flex items-center justify-start gap-4 mb-4">
            <a id="dynamic-back-btn" href="management.html" class="p-2 text-brand-dark hover:text-brand-primary hover:bg-brand-grayBg rounded-lg transition-colors flex items-center justify-center">
             <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="text-2xl font-bold text-brand-darkest transition-colors">Add New Employee</h1>
          </div>
        </div>
        
        <div class="px-4 sm:px-6 md:px-8 pt-2 pb-8">
          
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="form-panel">
              <form id="add-employee-form" class="space-y-6">
                
                <div>
                  <h3 class="section-title">Personal Information</h3>
                  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="form-group">
                      <label for="first-name" class="form-label">First Name</label>
                      <input type="text" id="first-name" required class="form-input" placeholder="John">
                    </div>
                    <div class="form-group">
                      <label for="middle-name" class="form-label">Middle Name</label>
                      <input type="text" id="middle-name" class="form-input" placeholder="Michael">
                    </div>
                    <div class="form-group">
                      <label for="last-name" class="form-label">Last Name</label>
                      <input type="text" id="last-name" required class="form-input" placeholder="Doe">
                    </div>
                  </div>
                </div>

                <div>
                  <h3 class="section-title">Contact Information</h3>
                  <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" required class="form-input" placeholder="john.doe@company.com">
                  </div>
                </div>

                <div>
                  <h3 class="section-title">Employment Information</h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="form-group">
                      <label for="employee-id" class="form-label">Employee ID</label>
                      <input type="text" id="employee-id" required class="form-input" placeholder="e.g., EMP-001">
                    </div>
                    <div class="form-group">
                      <label for="department" class="form-label">Department</label>
                      <select id="department" required class="form-input">
                        <option value="">Select Department</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Design">Design</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                      </select>
                    </div>
                  </div>
                  
                  <div class="form-group">
                    <label for="assigned-team" class="form-label">Assigned Team</label>
                    <select id="assigned-team" required class="form-input" disabled>
                      <option value="">Please select a department first</option>
                    </select>
                  </div>
                </div>

              </form>
            </div>

            <div class="form-panel">
              <div class="space-y-6 flex-1 flex flex-col">
                
                <div class="flex-1">
                  <h3 class="section-title">System Role</h3>
                  
                  <div class="space-y-3">
                    <label class="role-card">
                      <input type="radio" name="system-role" value="Employee" checked class="role-radio" form="add-employee-form">
                      <div>
                        <span class="role-title">Employee</span>
                        <p class="role-desc">Standard user with limited permissions.</p>
                      </div>
                    </label>
                    
                    <label class="role-card">
                      <input type="radio" name="system-role" value="Manager" class="role-radio" form="add-employee-form">
                      <div>
                        <span class="role-title">Manager</span>
                        <p class="role-desc">Team management and reporting access.</p>
                      </div>
                    </label>

                    <label class="role-card">
                      <input type="radio" name="system-role" value="Admin" class="role-radio" form="add-employee-form">
                      <div>
                        <span class="role-title">Administrator</span>
                        <p class="role-desc">Full system access and configuration.</p>
                      </div>
                    </label>
                  </div>
                </div>

                <div class="flex flex-row items-center gap-3 pt-6 border-t border-brand-grayLight mt-auto transition-colors">
                  <a id="dynamic-cancel-btn" href="management.html" class="flex-1 py-3 px-4 bg-brand-surface border border-brand-grayLight text-brand-darkest text-sm font-bold rounded-xl flex items-center justify-center hover:opacity-80 transition-colors shadow-sm">
                    Cancel
                  </a>
                  <button type="submit" form="add-employee-form" class="flex-1 py-3 px-4 bg-brand-primary text-white border border-transparent text-sm font-bold rounded-xl flex items-center justify-center hover:bg-brand-dark transition-colors shadow-sm">
                    Add Employee
                  </button>
                </div>

              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="scripts/layout.js"></script>
  <script src="scripts/add-employee.js"></script>
</body>
</html>
