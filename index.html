<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TimeTrack Portal</title>
  
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/layout.css">
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: '#000523', darker: '#000533', dark: '#000b66',
              primary: '#001aff', secondary: '#007bff', accent: '#00d1ff',
              accentLight: '#57e8ff', grayLight: '#f1f1f1', grayBg: '#f8fafc'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full font-sans text-gray-700 login-body">

  <main class="login-card">
    <div class="login-header">
      <div class="flex items-center justify-center gap-3 mb-6">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none" id="logo-svg">
            <circle cx="16" cy="16" r="13" stroke="#1A1A1A" stroke-width="2"/>
            <path d="M16 8v9l5 4" stroke="#1A1A1A" stroke-width="2"/>
            <circle cx="16" cy="16" r="2" fill="#1A1A1A"/>
        </svg>
        <span class="font-display font-bold text-2xl text-[#1A1A1A]" id="nav-brand">Clocket</span>
      </div>
      
      <h1 class="login-title">Admin Portal</h1>
      <p class="login-subtitle">Enter your credentials to access the dashboard</p>
    </div>

    <form action="dashboard.html" method="GET">
      
      <div class="login-form-group">
        <label for="email" class="login-label">Email Address</label>
        <div class="login-input-wrapper">
          <i data-lucide="mail" class="login-icon"></i>
          <input type="email" id="email" required class="login-input" placeholder="admin@company.com">
        </div>
      </div>

      <div class="login-form-group">
        <label for="password" class="login-label">Password</label>
        <div class="login-input-wrapper">
          <i data-lucide="lock" class="login-icon"></i>
          <input type="password" id="password" required class="login-input" placeholder="••••••••">
        </div>
      </div>

      <div class="login-options">
        <label class="login-checkbox">
          <input type="checkbox" checked style="accent-color: var(--brand-primary);">
          <span>Remember me</span>
        </label>
        <a href="#" class="login-forgot">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">Sign In to Dashboard</button>
    </form>
    
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        if(window.lucide) {
            lucide.createIcons();
        }
    });
  </script>
</body>
</html>
