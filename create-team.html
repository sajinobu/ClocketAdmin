<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clocket | Create Team</title>
  
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/create-team.css">
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: '#000523', darker: '#000533', dark: '#000b66',
              primary: '#001aff', secondary: '#007bff', accent: '#00d1ff',
              accentLight: '#57e8ff', grayLight: '#f1f1f1', grayBg: '#f8fafc'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-brand-grayBg font-sans text-gray-700 overflow-auto">
  <div class="flex flex-col h-full w-full">
    
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
      
      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-auto bg-brand-grayBg">
        
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <div class="page-header-container">
            <a id="dynamic-back-btn" href="management.html?tab=teams" class="btn-back">
             <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="page-title">Create New Team</h1>
          </div>
        </div>
        
        <div class="px-4 sm:px-6 md:px-8 pt-6 pb-8">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="form-panel">
              <form id="create-team-form" class="space-y-6">
                
                <div>
                  <h3 class="section-title">Team Information</h3>
                  <div class="space-y-4">
                    <div class="form-group">
                      <label for="team-name" class="form-label">Team Name</label>
                      <input type="text" id="team-name" required class="form-input" placeholder="e.g., Engineering Team A">
                    </div>
                    <div class="form-group">
                      <label for="team-description" class="form-label">Description</label>
                      <textarea id="team-description" class="form-input" placeholder="Brief description of the team"></textarea>
                    </div>
                  </div>
                </div>

                <div class="pt-6 border-t border-brand-gray-light">
                  <h3 class="section-title">Team Structure</h3>
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="form-group">
                      <label for="team-department" class="form-label">Department</label>
                      <select id="team-department" required class="form-input">
                        <option value="">Select Department</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Design">Design</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                      </select>
                    </div>
                    <div class="form-group">
                      <label for="team-lead" class="form-label">Team Lead</label>
                      <select id="team-lead" required class="form-input">
                        <option value="">Select Team Lead</option>
                        <option value="Sarah Johnson">Sarah Johnson</option>
                        <option value="Mike Chen">Mike Chen</option>
                        <option value="Emma Wilson">Emma Wilson</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="pt-6 border-t border-brand-gray-light">
                  <h3 class="section-title">Add Team Member</h3>
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <div class="form-group">
                      <label for="new-member-dept" class="form-label">Department</label>
                      <select id="new-member-dept" class="form-input">
                        <option value="">Select Dept...</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Design">Design</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                      </select>
                    </div>
                    <div class="form-group">
                      <label for="new-member-name" class="form-label">Employee Name</label>
                      <input type="text" id="new-member-name" class="form-input" placeholder="e.g. Jane Doe">
                    </div>
                  </div>
                  
                  <button type="button" id="add-member-btn" class="btn-secondary" disabled>
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Add Member
                  </button>

                  <div id="added-members-container" class="member-list"></div>
                </div>

              </form>
            </div>

            <div class="form-panel">
              <div class="space-y-6 flex-1 flex flex-col">
                <div class="flex-1">
                  <h3 class="section-title">Team Settings</h3>
                  <div class="form-group">
                    <label for="team-size" class="form-label">Expected Number of Members</label>
                    <input type="number" id="team-size" min="1" max="100" required form="create-team-form" class="form-input" placeholder="e.g., 8">
                  </div>

                  <div class="mt-8 pt-8 border-t border-brand-gray-light">
                    <h3 class="form-label mb-3">Quick Reference</h3>
                    <div class="info-box">
                        <p class="info-title">Teams are organizational units</p>
                        <p class="info-text">Assign team members to manage work and track attendance more efficiently across departments.</p>
                    </div>
                  </div>
                </div>

                <div class="form-actions">
                  <a id="dynamic-cancel-btn" href="management.html?tab=teams" class="btn-cancel">Cancel</a>
                  <button type="submit" form="create-team-form" class="btn-primary">Create Team</button>
                </div>
              </div>
            </div>
            
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="scripts/layout.js"></script>
  <script src="scripts/create-team.js"></script>
</body>
</html>
