<!doctype html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Team | Clocket</title>

  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/create-team.css">

  <script type="module" src="scripts/firebase-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              darkest: 'var(--brand-darkest)',
              darker: 'var(--brand-darker)',
              dark: 'var(--brand-dark)',
              primary: 'var(--brand-primary)',
              secondary: 'var(--brand-secondary)',
              accent: 'var(--brand-accent)',
              accentLight: 'var(--brand-accent-light)',
              grayLight: 'var(--brand-gray-light)',
              grayBg: 'var(--brand-gray-bg)',
              surface: 'var(--brand-surface)'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-brand-grayBg font-sans text-brand-darkest overflow-auto transition-colors duration-300">
  <div class="flex flex-col h-full w-full">
    <div id="header-placeholder"></div>
    <div class="flex flex-1 overflow-hidden">
      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-auto bg-brand-grayBg relative transition-colors duration-300">
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <div class="page-header-container">
            <a id="dynamic-back-btn" href="management.html?tab=teams"
              class="p-2 text-brand-dark hover:text-brand-primary hover:bg-brand-grayBg rounded-lg transition-colors flex items-center justify-center">
              <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="text-2xl font-bold text-brand-darkest transition-colors">Create New Team</h1>
          </div>
        </div>

        <div class="px-4 sm:px-6 md:px-8 pt-6 pb-8">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <div class="form-panel">
              <form id="create-team-form" class="space-y-6">
                <div>
                  <h3 class="section-title">Team Identity</h3>
                  <div class="space-y-4">
                    <div class="form-group">
                      <label for="team-name" class="form-label">Team Name</label>
                      <input type="text" id="team-name" required class="form-input"
                        placeholder="e.g., IT Support Alpha">
                    </div>

                    <div class="form-group">
                      <label class="form-label">Team Department</label>
                      <div class="custom-dropdown form-variant w-full" id="team-dept-custom-dropdown">
                        <div class="dropdown-trigger">
                          <span id="team-dept-text">Select Department</span>
                          <i data-lucide="chevron-down" class="w-4 h-4 ml-auto text-brand-dark"></i>
                        </div>
                        <div class="dropdown-menu">
                          <div class="dropdown-item active" data-value="">Select Department</div>
                          <div class="dropdown-item" data-value="Engineering">Engineering</div>
                          <div class="dropdown-item" data-value="IT">IT</div>
                          <div class="dropdown-item" data-value="Design">Design</div>
                          <div class="dropdown-item" data-value="Operations">Operations</div>
                          <div class="dropdown-item" data-value="Sales">Sales</div>
                        </div>
                      </div>
                      <input type="hidden" id="team-department" value="">
                    </div>

                    <div class="form-group">
                      <label for="team-description" class="form-label">Description</label>
                      <textarea id="team-description" class="form-input" rows="4"
                        placeholder="Purpose of this team..."></textarea>
                    </div>
                  </div>
                </div>
              </form>
            </div>

            <div class="form-panel">
              <div class="space-y-6 flex-1 flex flex-col">
                <div>
                  <h3 class="section-title">Leadership</h3>
                  <div class="form-group">
                    <label class="form-label">Team Lead</label>
                    <div class="custom-dropdown form-variant w-full disabled" id="team-lead-custom-dropdown">
                      <div class="dropdown-trigger">
                        <span id="team-lead-text">Select department first...</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 ml-auto text-brand-dark"></i>
                      </div>
                      <div class="dropdown-menu"></div>
                    </div>
                    <input type="hidden" id="team-lead" value="">
                  </div>
                </div>

                <div class="pt-6 border-t border-brand-grayLight">
                  <h3 class="section-title">Team Members</h3>
                  <div class="form-group mb-4">
                    <label class="form-label">Employee Name</label>
                    <div class="custom-dropdown form-variant w-full disabled" id="new-member-name-dropdown">
                      <div class="dropdown-trigger">
                        <span id="new-member-name-text">Select department first...</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 ml-auto text-brand-dark"></i>
                      </div>
                      <div class="dropdown-menu" id="new-member-name-list"></div>
                    </div>
                    <input type="hidden" id="new-member-name" value="">
                  </div>

                  <button type="button" id="add-member-btn" class="btn-secondary w-full" disabled>
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Add Member
                  </button>

                  <div id="added-members-container" class="member-list mt-4 max-h-[200px] overflow-y-auto"></div>
                </div>

                <div class="mt-auto pt-8">
                  <div class="form-actions">
                    <a id="dynamic-cancel-btn" href="management.html?tab=teams" class="btn-cancel">Cancel</a>
                    <button type="submit" form="create-team-form" class="btn-primary">Create Team</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="custom-alert-modal" class="fixed inset-0 z-[10000] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="custom-alert-backdrop"></div>
    
    <div class="relative bg-brand-surface border border-brand-grayLight rounded-2xl shadow-2xl w-full max-w-sm p-6 mx-4 transform scale-95 transition-transform duration-300" id="custom-alert-box">
      <div class="flex flex-col items-center text-center">
        <div class="w-12 h-12 rounded-full bg-[rgba(239,68,68,0.1)] text-red-500 flex items-center justify-center mb-4">
          <i data-lucide="alert-circle" class="w-6 h-6"></i>
        </div>
        
        <h3 id="custom-alert-title" class="text-lg font-bold text-brand-darkest mb-2">Notice</h3>
        <p id="custom-alert-message" class="text-sm text-brand-dark mb-6">Message goes here.</p>
        
        <button type="button" id="custom-alert-btn" class="btn-primary w-full justify-center">
          Got it
        </button>
      </div>
    </div>
  </div>
  <script src="scripts/layout.js"></script>
  <script src="scripts/create-team.js"></script>
</body>

</html>
