<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clocket</title>

    <script type="module" src="scripts/firebase-config.js"></script>
    <script>
    tailwind.config = {
      darkMode: 'class', 
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: 'var(--brand-darkest)', 
              darker: 'var(--brand-darker)', 
              dark: 'var(--brand-dark)',
              primary: 'var(--brand-primary)', 
              secondary: 'var(--brand-secondary)', 
              accent: 'var(--brand-accent)',
              accentLight: 'var(--brand-accent-light)', 
              grayLight: 'var(--brand-gray-light)', 
              grayBg: 'var(--brand-gray-bg)',
              surface: 'var(--brand-surface)' 
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<header class="site-header">
    <button id="mobile-menu-btn" class="mobile-menu-btn">
        <i data-lucide="menu" class="w-6 h-6"></i>
    </button>

    <div class="brand-logo-wrapper">
        <svg class="header-logo-svg" viewBox="0 0 32 32" fill="none" id="logo-svg">
            <circle cx="16" cy="16" r="13" class="stroke-brand-darkest transition-colors" stroke-width="2"/>
            <path d="M16 8v9l5 4" class="stroke-brand-darkest transition-colors" stroke-width="2"/>
            <circle cx="16" cy="16" r="2" class="fill-brand-darkest transition-colors"/>
        </svg>
        <span class="brand-text" id="nav-brand">Clocket</span>
    </div>

    <div class="header-right-desktop">
        <div id="header-date" class="header-date"></div>
        <button id="theme-toggle-btn" class="theme-toggle-btn text-brand-darkest" title="Toggle Dark Mode"></button>
    </div>
</header>

</body>
</html>
