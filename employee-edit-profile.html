<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Employee - TimeTrack Portal</title>
  
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/employee-edit-profile.css">
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 
              darkest: '#000523', darker: '#000533', dark: '#000b66',
              primary: '#001aff', secondary: '#007bff', accent: '#00d1ff',
              accentLight: '#57e8ff', grayLight: '#f1f1f1', grayBg: '#f8fafc'
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="h-full bg-brand-grayBg font-sans text-gray-700 overflow-auto">
  <div class="flex flex-col h-full w-full">
    
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
      
      <div id="sidebar-placeholder"></div>

      <main class="flex-1 overflow-auto bg-brand-grayBg">
        
        <div class="px-8 pt-8 pb-3 flex-shrink-0">
          <div class="page-header-container">
            <a id="dynamic-back-btn" href="employee-profile.html" class="btn-back">
             <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="page-title">Edit Employee Details</h1>
          </div>
        </div>
        
        <div class="px-4 sm:px-6 md:px-8 pt-6 pb-8">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="form-panel">
              
              <div class="avatar-edit-section">
                <div class="avatar-wrapper">
                  <div class="avatar-circle">SJ</div>
                  <button class="btn-camera">
                    <i data-lucide="camera" class="w-4 h-4"></i>
                  </button>
                </div>
                <div>
                  <h2 class="employee-name">Sarah Johnson</h2>
                  <p class="employee-id-text">EMP-001</p>
                </div>
              </div>

              <form id="edit-employee-form" class="space-y-6">
                <div>
                  <h3 class="section-title">Personal Information</h3>
                  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="form-group">
                      <label for="edit-first-name" class="form-label">First Name</label>
                      <input type="text" id="edit-first-name" value="Sarah" required class="form-input">
                    </div>
                    <div class="form-group">
                      <label for="edit-middle-name" class="form-label">Middle Name</label>
                      <input type="text" id="edit-middle-name" placeholder="Optional" class="form-input">
                    </div>
                    <div class="form-group">
                      <label for="edit-last-name" class="form-label">Last Name</label>
                      <input type="text" id="edit-last-name" value="Johnson" required class="form-input">
                    </div>
                  </div>
                </div>

                <div>
                  <h3 class="section-title">Contact Information</h3>
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="form-group">
                      <label for="edit-email" class="form-label">Email Address</label>
                      <input type="email" id="edit-email" value="sarah.j@company.com" required class="form-input">
                    </div>
                    <div class="form-group">
                      <label for="edit-phone" class="form-label">Phone Number</label>
                      <input type="tel" id="edit-phone" value="+1 (555) 987-6543" class="form-input">
                    </div>
                  </div>
                </div>

                <div>
                  <h3 class="section-title">Employment Information</h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="form-group">
                      <label for="edit-employee-id" class="form-label">Employee ID</label>
                      <input type="text" id="edit-employee-id" value="EMP-001" disabled class="form-input">
                    </div>
                    <div class="form-group">
                      <label for="edit-department" class="form-label">Department</label>
                      <select id="edit-department" required class="form-input">
                        <option value="Engineering" selected>Engineering</option>
                        <option value="Design">Design</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                      </select>
                    </div>
                  </div>
                  
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-group">
                      <label for="edit-job-title" class="form-label">Job Title</label>
                      <input type="text" id="edit-job-title" value="Senior Frontend Developer" required class="form-input">
                    </div>
                    <div class="form-group">
                      <label for="edit-assigned-team" class="form-label">Assigned Team</label>
                      <select id="edit-assigned-team" required class="form-input">
                        <option value="Engineering Team A" selected>Engineering Team A</option>
                        <option value="Design Team B">Design Team B</option>
                        <option value="Operations Team A">Operations Team A</option>
                      </select>
                    </div>
                  </div>
                </div>
              </form>
            </div>

            <div class="form-panel">
              <div class="space-y-6 flex-1 flex flex-col">
                
                <div>
                  <h3 class="section-title">System Role</h3>
                  <div class="space-y-3">
                    <label class="role-card">
                      <input type="radio" name="system-role" value="Employee" checked class="role-radio" form="edit-employee-form">
                      <div>
                        <span class="role-title">Employee</span>
                        <p class="role-desc">Standard user with limited permissions</p>
                      </div>
                    </label>
                    <label class="role-card">
                      <input type="radio" name="system-role" value="Manager" class="role-radio" form="edit-employee-form">
                      <div>
                        <span class="role-title">Manager</span>
                        <p class="role-desc">Team management and reporting access</p>
                      </div>
                    </label>
                  </div>
                </div>

                <div>
                  <h3 class="section-title">Account Status</h3>
                  <div class="form-group">
                    <select id="edit-status" form="edit-employee-form" class="form-input">
                      <option value="Active" selected>Active</option>
                      <option value="On Leave">On Leave</option>
                      <option value="Suspended">Suspended</option>
                    </select>
                  </div>
                </div>

                <div class="form-actions">
                  <a id="dynamic-cancel-btn" href="employee-profile.html" class="btn-cancel">Cancel</a>
                  <button type="submit" form="edit-employee-form" class="btn-primary">Save Changes</button>
                </div>
              </div>
            </div>
            
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="scripts/layout.js"></script>
  <script src="scripts/employee-edit-profile.js"></script>
</body>
</html>
